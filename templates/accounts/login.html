{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HireSense AI</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-badge">🧠</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to HireSense AI</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}error{% else %}info{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" name="username" id="id_username"
                 class="form-control" style="padding-left:38px"
                 placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" name="password" id="id_password"
                 class="form-control" style="padding-left:38px;padding-right:44px"
                 placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" id="togglePwd"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="justify-content:center;margin-top:4px">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <div style="text-align:center;font-size:14px;color:var(--text-secondary)">
      Don't have an account?
      <a href="{% url 'signup' %}" style="color:var(--accent);font-weight:600">Sign up free</a>
    </div>
    <div style="text-align:center;margin-top:20px">
      <a href="{% url 'landing' %}" style="font-size:13px;color:var(--text-muted)">
        <i class="fas fa-arrow-left"></i> Back to home
      </a>
    </div>
  </div>
</div>

<script src="{% static 'js/main.js' %}"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', function() {
    const input = document.getElementById('id_password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });
</script>
</body>
</html>
